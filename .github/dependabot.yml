version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Chicago
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore(actions)
    groups:
      github-actions-patch-minor:
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
