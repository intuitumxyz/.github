name: Secret Scan

on:
  # Scope branch pushes to protected branches only — PRs cover the same commits
  # via `pull_request`. Tags kept (`tags: ['**']`) since a tag push has no
  # accompanying PR event.
  push:
    branches:
      - main
    tags:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      # Use the gitleaks binary directly rather than gitleaks/gitleaks-action,
      # which requires a paid GITLEAKS_LICENSE for organization-owned repos.
      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --exit-code 1
