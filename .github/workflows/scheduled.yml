name: Scheduled org-wide automation

# Org-wide cron-triggered automation. Runs from the .github repo so routine
# maintenance does not need per-repo Nodus Bot cron wiring.

on:
  schedule:
    - cron: '0 13 * * *'  # 8am CST / 13:00 UTC — daily stale-PR sweep
  workflow_dispatch:

jobs:
  stale-pr-sweep:
    uses: ./.github/workflows/stale-pr-sweeper.yml
    secrets:
      BOT_TOKEN: ${{ secrets.NODUS_BOT_PAT }}

  failed-workflow-digest:
    runs-on: [self-hosted, server]
    permissions:
      issues: write
      actions: read
    steps:
      - name: Open or update failed workflow digest
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.NODUS_BOT_PAT }}
          script: |
            const org = context.repo.owner;
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const failures = [];

            const { data: repos } = await github.rest.repos.listForOrg({
              org,
              type: 'all',
              per_page: 100,
            });

            for (const repo of repos) {
              if (repo.archived) continue;
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: org,
                repo: repo.name,
                status: 'completed',
                created: `>=${since}`,
                per_page: 50,
              });

              for (const run of data.workflow_runs) {
                if (!['failure', 'startup_failure', 'timed_out', 'cancelled'].includes(run.conclusion)) continue;
                failures.push({
                  repo: repo.name,
                  workflow: run.name,
                  conclusion: run.conclusion,
                  branch: run.head_branch,
                  url: run.html_url,
                  created: run.created_at,
                });
              }
            }

            failures.sort((a, b) =>
              a.repo.localeCompare(b.repo) ||
              a.workflow.localeCompare(b.workflow) ||
              b.created.localeCompare(a.created)
            );

            const marker = '<!-- nodus:failed-workflow-digest -->';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: org,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find(issue => issue.body && issue.body.includes(marker));

            if (failures.length === 0) {
              if (existing) {
                await github.rest.issues.update({
                  owner: org,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
              }
              core.summary.addHeading('Failed workflow digest').addRaw('No failed org workflow runs in the last 24 hours.').write();
              return;
            }

            const lines = failures.slice(0, 50).map(f =>
              `- [${f.repo}] ${f.workflow} on \`${f.branch || 'unknown'}\` — **${f.conclusion}** ([run](${f.url}))`
            );
            const fingerprint = failures.map(f => `${f.repo}:${f.workflow}:${f.conclusion}:${f.branch}:${f.url}`).join('|');
            const body = [
              marker,
              `<!-- fingerprint:${fingerprint} -->`,
              `## Failed workflow digest`,
              ``,
              `${failures.length} failed org workflow run${failures.length === 1 ? '' : 's'} in the last 24 hours.`,
              ``,
              ...lines,
              ``,
              `_Generated by nodus-bot from the central getnodus/.github schedule._`,
            ].join('\n');

            if (existing && existing.body && existing.body.includes(`<!-- fingerprint:${fingerprint} -->`)) {
              core.summary.addHeading('Failed workflow digest').addRaw('No digest changes.').write();
              return;
            }

            if (existing) {
              await github.rest.issues.update({
                owner: org,
                repo: context.repo.repo,
                issue_number: existing.number,
                title: `Failed workflow digest — ${failures.length} run${failures.length === 1 ? '' : 's'}`,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: org,
                repo: context.repo.repo,
                title: `Failed workflow digest — ${failures.length} run${failures.length === 1 ? '' : 's'}`,
                body,
                assignees: ['fschrhunt'],
              });
            }

            core.summary.addHeading('Failed workflow digest').addRaw(`${failures.length} failures found.`).write();
