# Reusable CI for Cloudflare Workers / @opennextjs/cloudflare repos.
# Caller:
#   jobs:
#     ci:
#       uses: getnodus/.github/.github/workflows/ci-cloudflare-workers.yml@main

name: CI (Cloudflare Workers)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '20'
      package-manager:
        type: string
        default: pnpm

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - run: ${{ inputs.package-manager }} install --frozen-lockfile
      - run: ${{ inputs.package-manager }} run typecheck --if-present
      - run: ${{ inputs.package-manager }} run lint --if-present
      - run: ${{ inputs.package-manager }} run test --if-present
      - name: Wrangler typegen + build
        run: ${{ inputs.package-manager }} run build
