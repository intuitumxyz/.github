name: Dependabot auto-merge (reusable)

# Called from each repo via:
#   jobs:
#     auto-merge:
#       uses: getnodus/.github/.github/workflows/dependabot-auto-merge.yml@main
#       permissions: { contents: write, pull-requests: write }
#
# Auto-approves and enables auto-merge for Dependabot PRs that are
# patch or minor bumps. Major bumps stay manual (and dependabot.yml
# is already configured to ignore majors anyway, so this is belt+suspenders).

on:
  workflow_call:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Approve PR
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
