name: Release Please (reusable)

# Reusable wrapper around googleapis/release-please-action. Caller repo
# must provide its own release-please-config.json and
# .release-please-manifest.json at the repo root.

on:
  workflow_call:
    inputs:
      config-file:
        type: string
        default: release-please-config.json
      manifest-file:
        type: string
        default: .release-please-manifest.json
    secrets:
      NODUS_BOT_PAT:
        required: false

jobs:
  release-please:
    runs-on: [self-hosted, server]
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - id: config
        name: Check release-please config
        run: |
          if [ -f "${{ inputs.config-file }}" ] && [ -f "${{ inputs.manifest-file }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Release Please config or manifest is missing; skipping."
          fi

      # Prefer NODUS_BOT_PAT so release PRs are authored by nodus-bot. If the
      # token is not available, fall back to the repo token instead of making
      # the entire caller workflow fail at startup.
      - uses: googleapis/release-please-action@v5
        if: steps.config.outputs.enabled == 'true'
        with:
          token: ${{ secrets.NODUS_BOT_PAT || github.token }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
