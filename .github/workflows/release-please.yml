name: Release Please (reusable)

# Reusable wrapper around googleapis/release-please-action. Caller repo
# must provide its own release-please-config.json and
# .release-please-manifest.json at the repo root.

on:
  workflow_call:
    inputs:
      config-file:
        type: string
        default: release-please-config.json
      manifest-file:
        type: string
        default: .release-please-manifest.json
    secrets:
      NODUS_BOT_PAT:
        required: true

jobs:
  release-please:
    runs-on: [self-hosted, server]
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      # Use NODUS_BOT_PAT, not the default GITHUB_TOKEN, so release PRs are
      # authored by nodus-bot — github-actions[bot] PRs do NOT trigger
      # downstream workflow runs, so CI would never run on release PRs.
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.NODUS_BOT_PAT }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
