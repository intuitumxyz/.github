name: Typecheck (reusable)

# Conservative reusable Node check.
# Installs dependencies and runs one package script without committing,
# auto-fixing, or merging anything. Callers wire this from their repo-local
# ci.yml and keep repo-specific choices as inputs.

on:
  workflow_call:
    inputs:
      command:
        description: 'Package script to run, such as typecheck, build, test, or lint'
        type: string
        default: typecheck
      node-version:
        description: 'Node.js version to use when .nvmrc is absent'
        type: string
        default: '22'
      skip-docs-only:
        description: 'Skip the check when a pull request only changes inert docs/config files'
        type: boolean
        default: true

jobs:
  check:
    runs-on: [self-hosted, server]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: changes
        name: Detect docs-only changes
        if: github.event_name == 'pull_request' && inputs.skip-docs-only
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --depth=50 origin "$BASE_SHA" 2>/dev/null || true
          CHANGED=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"

          NON_DOCS=$(echo "$CHANGED" | grep -vE '\.(md|markdown|txt|json5?|ya?ml|toml)$|^(docs|\.github/ISSUE_TEMPLATE|profile)/|^LICENSE$|^CHANGELOG' || true)
          LOCKFILE_TOUCHED=$(echo "$CHANGED" | grep -E '(^|/)(pnpm-lock\.yaml|package-lock\.json|yarn\.lock|Cargo\.lock|poetry\.lock|uv\.lock|go\.sum)$' || true)

          if [ -z "$NON_DOCS" ] && [ -z "$LOCKFILE_TOUCHED" ] && [ -n "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Docs/config-only change; skipping ${{ inputs.command }}."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - id: pm
        name: Detect package manager
        if: steps.changes.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          else
            echo "pm=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Node version
        id: node
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm != 'none'
        run: |
          set -euo pipefail
          if [ -s .nvmrc ]; then
            echo "version=$(tr -d '[:space:]' < .nvmrc)" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.node-version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm == 'pnpm'
        with:
          dest: ${{ runner.temp }}/setup-pnpm

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm != 'none'
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: ${{ steps.pm.outputs.pm }}

      - name: Install dependencies (pnpm)
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm == 'pnpm'
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (npm)
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm == 'npm'
        run: npm ci

      - id: script
        name: Check requested script exists
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm != 'none'
        env:
          COMMAND: ${{ inputs.command }}
        run: |
          set -euo pipefail
          if jq -e --arg command "$COMMAND" '.scripts[$command] // empty' package.json >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package.json script named '$COMMAND'; skipping this check."
          fi

      - name: Run ${{ inputs.command }} (pnpm)
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm == 'pnpm' && steps.script.outputs.exists == 'true'
        run: pnpm run ${{ inputs.command }}

      - name: Run ${{ inputs.command }} (npm)
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm == 'npm' && steps.script.outputs.exists == 'true'
        run: npm run ${{ inputs.command }}

      - name: No Node project detected
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm == 'none'
        run: echo "No pnpm-lock.yaml or package-lock.json found; nothing to run."
