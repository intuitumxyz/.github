name: Typecheck (reusable)

# Reusable workflow: install deps + run `<pm> <command>` with Claude auto-fix
# on failure. Skips entirely for docs / yaml / config-only PRs. Auto-detects
# the package manager via lockfile (pnpm > npm).

on:
  workflow_call:
    inputs:
      command:
        description: 'pnpm/npm script to run (e.g. "typecheck", "build", "test")'
        type: string
        default: 'typecheck'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  check:
    runs-on: [self-hosted, server]
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - id: changes
        name: Detect docs-only / config-only changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -e
          git fetch --depth=50 origin "$BASE_SHA" 2>/dev/null || true
          CHANGED=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"
          NON_DOCS=$(echo "$CHANGED" | grep -vE '\.(md|markdown|txt|json5?|ya?ml|toml)$|^(docs|\.github)/|^LICENSE|^CHANGELOG' || true)
          if [ -z "$NON_DOCS" ] && [ -n "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "→ docs/config-only, skipping typecheck"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "→ code changes present, running typecheck"
          fi

      - id: pm
        name: Detect package manager
        if: steps.changes.outputs.skip != 'true'
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          else
            echo "pm=none" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected: $(cat $GITHUB_OUTPUT | grep pm=)"

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm != 'none'
        with:
          node-version-file: .nvmrc
          cache: ${{ steps.pm.outputs.pm }}

      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm == 'pnpm'

      - name: Install dependencies (pnpm)
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm == 'pnpm'
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (npm)
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm == 'npm'
        run: npm ci

      - name: Run "${{ inputs.command }}" (pnpm)
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm == 'pnpm'
        run: pnpm ${{ inputs.command }}

      - name: Run "${{ inputs.command }}" (npm)
        if: steps.changes.outputs.skip != 'true' && steps.pm.outputs.pm == 'npm'
        run: npm run ${{ inputs.command }}

      - name: Auto-fix with Claude on failure
        if: failure() && steps.changes.outputs.skip != 'true'
        timeout-minutes: 5
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            CI just failed on this PR. Read the failed step's logs
            (use `gh run view ${{ github.run_id }} --log-failed`),
            identify the cause, fix it on this branch, commit, and push.

            Constraints:
            - Fix only what's broken. Do NOT refactor or add unrelated changes.
            - If the fix requires changing the PR's intent or scope,
              instead post a comment explaining why and do NOT commit.
            - If you can't determine the cause from the logs, post a
              comment with what you found and do NOT commit.

            After committing, CI will re-run automatically. Don't try to
            re-run it yourself.
