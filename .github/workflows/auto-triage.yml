# Reusable Auto-Triage workflow.
# Runs Claude Code on issues labeled `auto-triage` to investigate the bug,
# attempt to reproduce, and (when confident) open a draft fix PR.
#
# Caller (per repo):
#   name: Auto-Triage
#   on:
#     issues:
#       types: [opened, labeled]
#   jobs:
#     call:
#       uses: getnodus/.github/.github/workflows/auto-triage.yml@main
#       permissions:
#         contents: write
#         pull-requests: write
#         issues: write
#         id-token: write
#         actions: read
#       secrets: inherit
#
# Repo must have `CLAUDE_CODE_OAUTH_TOKEN` available (org secret).
# Recommended: create an `auto-triage` label so triggering is explicit.

name: Auto-Triage

on:
  workflow_call:

jobs:
  triage:
    if: |
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'auto-triage')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'auto-triage')
    runs-on: ubuntu-latest
    concurrency:
      group: auto-triage-${{ github.repository }}-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code (Auto-Triage)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --allowedTools "Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh issue view:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh label:*),Bash(gh api:*),Bash(git checkout:*),Bash(git switch:*),Bash(git branch:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git status),Bash(git diff:*),Bash(git log:*),Bash(ls:*),Bash(pwd),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(grep:*),Bash(find:*),Bash(rg:*),Edit,Write,Read,Grep,Glob,LS,MultiEdit"
          prompt: |
            You are running as **Auto-Triage** on issue #${{ github.event.issue.number }}: "${{ github.event.issue.title }}".

            Issue body:
            ${{ github.event.issue.body }}

            Your job:
            1. Read the issue and any related code.
            2. Try to reproduce the bug or confirm the problem.
            3. Decide one of three outcomes:

            **A. Confident fix** — you can reproduce and fix it:
              - Create branch `auto-triage/issue-${{ github.event.issue.number }}` with `git checkout -b`.
              - Make the fix. Keep the diff minimal and on-topic.
              - Commit and push: `git push -u origin auto-triage/issue-${{ github.event.issue.number }}`.
              - Open a **draft** pull request with `gh pr create --draft --base main --title "..." --body "Fixes #${{ github.event.issue.number }} ..."`.
              - Add the `automation` label: `gh pr edit <num> --add-label automation`.
              - Comment on the issue: `gh issue comment ${{ github.event.issue.number }} --body "Opened draft PR #<num>"`.

            **B. Reproduced but unclear fix** — you confirmed the bug but the right fix isn't obvious:
              - Comment on the issue with reproduction steps, root cause, and 1-2 fix options with tradeoffs:
                `gh issue comment ${{ github.event.issue.number }} --body "..."`
              - Do NOT open a PR.

            **C. Cannot reproduce or insufficient info**:
              - Comment on the issue with what you tried, why it doesn't reproduce, and what info you need:
                `gh issue comment ${{ github.event.issue.number }} --body "..."`
              - Do NOT open a PR.

            Rules:
            - Never push to `main`. Never merge. Drafts only.
            - Stay on-topic — don't refactor unrelated code.
            - If the issue is clearly not a bug (feature request, question, duplicate, smoke test), follow path C — comment and stop.
            - You MUST take one of the three actions above before finishing. Don't just analyze silently.
          additional_permissions: |
            actions: read
