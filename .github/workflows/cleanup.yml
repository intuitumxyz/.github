name: PR Hygiene (reusable)

# Conservative PR hygiene checks.
# This replaces the old cleanup workflow's auto-commit behavior. It may
# comment on a PR, but it never changes the branch, pushes commits, or merges.

on:
  workflow_call:
    secrets:
      NODUS_BOT_PAT:
        required: false

jobs:
  hygiene:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: [self-hosted, server]
    permissions:
      contents: read
      pull-requests: read
      issues: write
    env:
      PR: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ secrets.NODUS_BOT_PAT || github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Warn on empty PR description
        if: github.event.action == 'opened' || github.event.action == 'edited'
        run: |
          set -euo pipefail
          body=$(gh pr view "$PR" --json body --jq '.body // ""')
          visible=$(printf '%s' "$body" | sed -E 's/<!--[^>]*-->//g' | tr -d '[:space:]')
          if [ -n "$visible" ]; then
            exit 0
          fi

          existing=$(gh pr view "$PR" --json comments --jq '.comments[].body' | grep -F '<!-- nodus:hygiene:empty-description -->' || true)
          if [ -n "$existing" ]; then
            exit 0
          fi

          gh pr comment "$PR" --body "<!-- nodus:hygiene:empty-description -->
          **PR hygiene: missing description**

          Please fill in the summary and verification notes before merge. This is advisory and does not block CI."

      - name: Warn on scratch debug
        if: github.event.action == 'opened' || github.event.action == 'synchronize'
        run: |
          set -euo pipefail
          diff=$(gh pr diff "$PR" || true)
          findings=""

          add_finding() {
            label="$1"
            pattern="$2"
            count=$(printf '%s\n' "$diff" | grep -cE "^\+[^+].*${pattern}" || true)
            if [ "${count:-0}" -gt 0 ]; then
              findings="${findings}
          - \`${label}\` (${count})"
            fi
          }

          add_finding "console.log" 'console\.log'
          add_finding "console.debug" 'console\.debug'
          add_finding "debugger" '\bdebugger;?'
          add_finding ".only(" '\.(it|describe|test)\.only\('
          add_finding "TODO remove" 'TODO:?\s*remove'
          add_finding "XXX" '\bXXX\b'
          add_finding "dbg!" 'dbg!\('

          if [ -z "$findings" ]; then
            exit 0
          fi

          existing=$(gh pr view "$PR" --json comments --jq '.comments[].body' | grep -F '<!-- nodus:hygiene:scratch-debug -->' || true)
          if [ -n "$existing" ]; then
            exit 0
          fi

          gh pr comment "$PR" --body "<!-- nodus:hygiene:scratch-debug -->
          **PR hygiene: scratch debug found**
          $findings

          Please remove these before merge. This is advisory and does not block CI."

      - name: Warn on sensitive workflow/security paths
        if: github.event.action == 'opened' || github.event.action == 'synchronize'
        run: |
          set -euo pipefail
          files=$(gh pr view "$PR" --json files --jq '.files[].path')
          sensitive=$(printf '%s\n' "$files" | grep -E '(^|/)(\.github/workflows/|CODEOWNERS|SECURITY\.md|auth|billing|stripe|payments?|migrations?/|secrets?|\.env)' || true)
          if [ -z "$sensitive" ]; then
            exit 0
          fi

          existing=$(gh pr view "$PR" --json comments --jq '.comments[].body' | grep -F '<!-- nodus:hygiene:sensitive-paths -->' || true)
          if [ -n "$existing" ]; then
            exit 0
          fi

          gh pr comment "$PR" --body "<!-- nodus:hygiene:sensitive-paths -->
          **PR hygiene: human review recommended**

          This PR touches workflow, deploy, auth, billing, migration, secret, or security-sensitive paths. Keep agent review advisory and require Fischer/human judgment before merge.

          \`\`\`
          $sensitive
          \`\`\`"
