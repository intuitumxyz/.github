name: AI Review (reusable)

# Reusable 3-tier AI review pipeline:
#   tier 1: heuristics + Ollama (local) — auto-approves trivial docs/config PRs
#   tier 2a: Claude — if local Ollama says "needs review" and Claude didn't author
#   tier 2b: Codex — if local Ollama says "needs review" and Claude DID author
# Sensitive paths (auth, billing, migrations, .github/workflows, secrets) skip
# AI review entirely and demand a human.
#
# Auto-merge is armed at PR open/sync — GitHub waits for required checks +
# approval before firing.

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  triage:
    if: github.event.pull_request.draft == false
    runs-on: [self-hosted, server]
    outputs:
      verdict: ${{ steps.classify.outputs.verdict }}
      reviewer: ${{ steps.author.outputs.reviewer }}
    permissions:
      contents: read
      pull-requests: write
    env:
      PR: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: author
        name: Pick a reviewer that didn't author the PR
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          COMMITS=$(gh pr view "$PR" --json commits --jq '.commits[].messageBody // ""')

          if [[ "$AUTHOR" == *claude* ]] || echo "$COMMITS" | grep -qi "Co-Authored-By:.*Claude"; then
            REVIEWER=codex
            REASON="author/co-author is Claude → Codex reviews"
          elif [[ "$AUTHOR" == *codex* ]] || echo "$COMMITS" | grep -qiE "Co-Authored-By:.*Codex|(generated|written|authored) by .* Codex"; then
            REVIEWER=claude
            REASON="author/co-author is Codex → Claude reviews"
          else
            REVIEWER=claude
            REASON="human author ($AUTHOR) → Claude reviews (default)"
          fi
          echo "reviewer=$REVIEWER" >> $GITHUB_OUTPUT
          echo "↳ $REASON"

      - id: classify
        name: Heuristics + Ollama pre-filter
        run: |
          set -e
          DIFF_LINES=$(gh pr diff "$PR" | wc -l)
          FILES=$(gh pr view "$PR" --json files --jq '.files[].path' | tr '\n' ' ')

          echo "diff: $DIFF_LINES lines · files: $FILES"

          if echo "$FILES" | grep -qE '(^|/)(auth|billing|stripe|payments?|migrations?/|secrets?|\.env)(/|$)|\.github/workflows/'; then
            echo "verdict=escalate-sensitive" >> $GITHUB_OUTPUT
            gh pr comment "$PR" --body "**AI review tier — skipped (sensitive path)**

          Touches auth/billing/migrations/workflows/secrets. Auto-review is deliberately disabled for these paths. Human review required."
            exit 0
          fi

          NON_DOCS=$(echo "$FILES" | tr ' ' '\n' | grep -vE '\.(md|txt|json5?|ya?ml)$' || true)
          if [ "$DIFF_LINES" -lt 50 ] && [ -z "$NON_DOCS" ]; then
            DIFF=$(gh pr diff "$PR" | head -300)

            PROMPT="You are the FIRST tier in a 3-tier PR review system. You are NOT the only reviewer.

          After you decide, larger cloud models (Claude or Codex) can still review the PR. Your role is a FILTER: skip cloud review only when a PR is so obviously trivial that paying for a careful reviewer would be wasteful.

          Be conservative. Saying NO costs nothing — it just escalates the PR to a smarter reviewer. Saying YES means this PR auto-merges with no further review, so reserve YES for truly inert changes.

          Answer YES only if ALL are true:
          - Diff is purely documentation, comments, typos, whitespace, or formatting
          - No code logic changes
          - No new dependencies, version bumps, or config changes that affect behavior
          - No unusual or surprising edits

          Otherwise answer NO.

          Reply in EXACTLY this format on TWO lines:

          VERDICT: YES
          REASON: <one sentence>

          PR diff:
          $DIFF"

            REQUEST_BODY=$(jq -n --arg p "$PROMPT" '{model:"qwen2.5-coder:7b", prompt:$p, stream:false, options:{temperature:0.1}}')
            RESPONSE=$(curl -s --max-time 60 http://127.0.0.1:11434/api/generate -d "$REQUEST_BODY" | jq -r '.response // ""')

            VERDICT=$(echo "$RESPONSE" | grep -oE 'VERDICT:[[:space:]]*(YES|NO)' | head -1 | grep -oE '(YES|NO)$')
            REASON=$(echo "$RESPONSE" | grep -A1 -m1 'REASON:' | head -1 | sed -E 's/^REASON:[[:space:]]*//')

            echo "ollama said: VERDICT=$VERDICT — $REASON"

            if [ "$VERDICT" = "YES" ]; then
              echo "verdict=ollama-approved" >> $GITHUB_OUTPUT
              gh pr review "$PR" --approve --body "**AI review tier 1 — Ollama (qwen2.5-coder:7b)**

          ${REASON:-Trivial docs/config-only change.}

          Auto-approved as a trivial, safe change. Cloud-tier review skipped to save token budget."
              exit 0
            fi
          fi

          echo "verdict=full-review" >> $GITHUB_OUTPUT

  claude-review:
    needs: triage
    if: needs.triage.outputs.verdict == 'full-review' && needs.triage.outputs.reviewer == 'claude'
    runs-on: [self-hosted, server]
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)"
          prompt: |
            Review pull request #${{ github.event.pull_request.number }}.

            You are the SECOND tier in a tiered review system. A local model (Ollama)
            already decided this PR needs a closer look, so don't auto-skip.

            Read the full diff: gh pr diff ${{ github.event.pull_request.number }}

            APPROVE by running:
              gh pr review ${{ github.event.pull_request.number }} --approve --body "<2-3 line summary>"

            ONLY if all of these hold:
            - Diff is under ~200 lines
            - Does NOT touch auth, payments, migrations, .github/workflows, deploys,
              env files, or secrets (Door 1 should have caught these but double-check)
            - Does NOT add or bump dependencies
            - Internally consistent with the PR description
            - No obvious bugs, regressions, or security issues
            - Style matches nearby code

            OTHERWISE — post a comment, do NOT approve:
              gh pr comment ${{ github.event.pull_request.number }} --body "<concerns>"

            Comment format:
              **AI review (Claude) — flagged for human**
              Reason: <bullet list of failing gates>
              Specific concerns: <if any>

            Be conservative. Default to flagging when unsure. Do not write code or
            modify the PR — review-only.

  codex-review:
    needs: triage
    if: needs.triage.outputs.verdict == 'full-review' && needs.triage.outputs.reviewer == 'codex'
    runs-on: [self-hosted, server]
    permissions:
      contents: read
      pull-requests: write
    env:
      PR: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch PR branch
        run: |
          git fetch origin "${{ github.event.pull_request.head.ref }}"
          git checkout "${{ github.event.pull_request.head.ref }}"

      - name: Codex review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TITLE=$(gh pr view "$PR" --json title --jq '.title')
          DESC=$(gh pr view "$PR" --json body --jq '.body // ""' | head -50)

          git fetch origin main --depth=1 2>/dev/null || true
          DIFF=$(git diff origin/main...HEAD 2>/dev/null | head -800)
          if [ -z "$DIFF" ]; then
            DIFF=$(gh pr diff "$PR" | head -800)
          fi

          cat > /tmp/codex-schema.json << 'SCHEMA'
          {
            "$schema": "https://json-schema.org/draft/2020-12/schema",
            "type": "object",
            "additionalProperties": false,
            "required": ["verdict", "summary"],
            "properties": {
              "verdict": { "enum": ["APPROVE", "FLAG"] },
              "summary": { "type": "string", "maxLength": 800 }
            }
          }
          SCHEMA

          PROMPT="You are the second tier in a tiered PR review system. A local model already decided this PR needs a closer look.

          Read the diff below and produce a JSON object that matches the provided output schema. The 'verdict' field must be either APPROVE or FLAG, and the 'summary' field must be a 2-3 sentence explanation that YOU write — do not return placeholders or instructional text.

          APPROVE only if ALL of these hold:
          - Diff is under ~200 lines
          - Does NOT touch auth, payments, migrations, workflow files, env, secrets
          - Does NOT add or bump dependencies
          - Internally consistent with the PR title and description
          - No bugs, regressions, or security issues you can spot
          - Style matches nearby code

          Otherwise FLAG with specific concerns from your own analysis. Be conservative — default to FLAG when uncertain.

          PR title: $TITLE
          PR description: $DESC

          --- DIFF ---
          $DIFF
          --- END DIFF ---"

          OUT=/tmp/codex-review-output.txt
          codex exec \
            --ephemeral \
            --ignore-user-config \
            --output-schema /tmp/codex-schema.json \
            --output-last-message "$OUT" \
            --color never \
            --skip-git-repo-check \
            "$PROMPT" 2>&1 | tail -30 || true

          echo "=== Codex final response ==="
          cat "$OUT" 2>/dev/null || echo "(no output captured)"
          echo "==========================="

          VERDICT=$(jq -r '.verdict // "FLAG"' < "$OUT" 2>/dev/null || echo "FLAG")
          SUMMARY=$(jq -r '.summary // "(no summary parsed)"' < "$OUT" 2>/dev/null || echo "(no summary)")

          if [ "$VERDICT" = "APPROVE" ]; then
            gh pr review "$PR" --approve --body "**AI review (Codex via CLI) — approved**

          $SUMMARY"
          else
            gh pr comment "$PR" --body "**AI review (Codex via CLI) — flagged for human**

          $SUMMARY"
          fi

  arm-automerge:
    if: github.event.pull_request.draft == false
    runs-on: [self-hosted, server]
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Arm auto-merge (squash)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --auto --squash 2>&1 | tee /dev/stderr || true
