name: Security (reusable)

# Reusable security scans. Runs on every PR alongside typecheck.
#   - gitleaks: detects committed secrets (free alternative to GHAS push protection)
#   - pnpm audit: flags high-severity advisories in production deps
#
# Separated from typecheck.yml so a security failure does NOT trigger
# the Claude auto-fix step (these failures want human attention).

on:
  workflow_call:
    inputs:
      gitleaks-version:
        type: string
        default: '8.27.2'
      audit-level:
        type: string
        description: 'pnpm audit minimum severity that fails the job'
        default: 'high'

jobs:
  gitleaks:
    runs-on: [self-hosted, server]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -e
          VERSION="${{ inputs.gitleaks-version }}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks version

      - name: Scan working tree for secrets
        run: |
          /tmp/gitleaks detect \
            --redact \
            --no-banner \
            --source . \
            --verbose

  pnpm-audit:
    runs-on: [self-hosted, server]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (production deps, ${{ inputs.audit-level }}+ severity)
        run: pnpm audit --prod --audit-level=${{ inputs.audit-level }}
