name: Security (reusable)

# Conservative reusable security checks.
# This workflow reports secret and dependency risk only. It never commits,
# auto-fixes, or merges.

on:
  workflow_call:
    inputs:
      gitleaks-version:
        type: string
        default: '8.27.2'
      audit-level:
        type: string
        description: 'Audit minimum severity that fails the job'
        default: high
      node-version:
        type: string
        default: '22'

jobs:
  gitleaks:
    runs-on: [self-hosted, server]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          version="${{ inputs.gitleaks-version }}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" version

      - name: Scan working tree for secrets
        run: |
          "$RUNNER_TEMP/gitleaks" detect \
            --redact \
            --no-banner \
            --source . \
            --verbose

  audit:
    runs-on: [self-hosted, server]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - id: pm
        name: Detect package manager
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          else
            echo "pm=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Node version
        id: node
        if: steps.pm.outputs.pm != 'none'
        run: |
          set -euo pipefail
          if [ -s .nvmrc ]; then
            echo "version=$(tr -d '[:space:]' < .nvmrc)" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.node-version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6
        if: steps.pm.outputs.pm == 'pnpm'
        with:
          dest: ${{ runner.temp }}/setup-pnpm

      - uses: actions/setup-node@v6
        if: steps.pm.outputs.pm != 'none'
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: ${{ steps.pm.outputs.pm }}

      - name: Install dependencies (pnpm)
        if: steps.pm.outputs.pm == 'pnpm'
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (npm)
        if: steps.pm.outputs.pm == 'npm'
        run: npm ci

      - name: Audit pnpm production dependencies
        if: steps.pm.outputs.pm == 'pnpm'
        run: pnpm audit --prod --audit-level=${{ inputs.audit-level }}

      - name: Audit npm production dependencies
        if: steps.pm.outputs.pm == 'npm'
        run: npm audit --omit=dev --audit-level=${{ inputs.audit-level }}

      - name: No Node project detected
        if: steps.pm.outputs.pm == 'none'
        run: echo "No pnpm-lock.yaml or package-lock.json found; skipping dependency audit."
