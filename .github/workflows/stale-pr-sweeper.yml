name: Stale PR sweeper (reusable)

# Scans every repo in the org for PRs that have been sitting open with no
# activity. Pings the author after 3 days, closes after 14. Keeps the
# inbox clean and surfaces forgotten flagged-for-human PRs.

on:
  workflow_call:
    inputs:
      remind-after-days:
        description: 'Post a reminder comment after this many days of inactivity'
        type: number
        default: 3
      close-after-days:
        description: 'Close the PR after this many days of inactivity'
        type: number
        default: 14
    secrets:
      BOT_TOKEN:
        description: 'PAT with read-org + write access to all repos'
        required: false

jobs:
  sweep:
    runs-on: [self-hosted, server]
    permissions:
      contents: read
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN || github.token }}
          script: |
            const REMIND_DAYS = ${{ inputs.remind-after-days }};
            const CLOSE_DAYS = ${{ inputs.close-after-days }};
            const ORG = context.repo.owner;
            const REMIND_MARKER = '<!-- stale-pr-sweeper:reminder -->';

            const { data: repos } = await github.rest.repos.listForOrg({
              org: ORG,
              per_page: 100,
              type: 'all',
            });

            let reminded = 0;
            let closed = 0;
            const now = new Date();

            for (const repo of repos) {
              if (repo.archived) continue;
              const { data: prs } = await github.rest.pulls.list({
                owner: ORG,
                repo: repo.name,
                state: 'open',
                per_page: 100,
              });
              for (const pr of prs) {
                if (pr.draft) continue;
                const updated = new Date(pr.updated_at);
                const ageDays = (now - updated) / (1000 * 60 * 60 * 24);

                if (ageDays >= CLOSE_DAYS) {
                  await github.rest.issues.createComment({
                    owner: ORG,
                    repo: repo.name,
                    issue_number: pr.number,
                    body: `Closing automatically — no activity in ${Math.floor(ageDays)} days. Reopen anytime if still relevant.`,
                  });
                  await github.rest.pulls.update({
                    owner: ORG,
                    repo: repo.name,
                    pull_number: pr.number,
                    state: 'closed',
                  });
                  closed++;
                  console.log(`closed ${ORG}/${repo.name}#${pr.number} (${Math.floor(ageDays)} days)`);
                  continue;
                }

                if (ageDays >= REMIND_DAYS) {
                  // Avoid double-pinging: check if a reminder already exists since last activity.
                  const { data: comments } = await github.rest.issues.listComments({
                    owner: ORG,
                    repo: repo.name,
                    issue_number: pr.number,
                    per_page: 100,
                  });
                  const hasReminder = comments.some(c =>
                    c.body && c.body.includes(REMIND_MARKER) &&
                    new Date(c.created_at) > updated
                  );
                  if (hasReminder) continue;

                  const assignee = pr.assignees?.[0]?.login || pr.user.login;
                  await github.rest.issues.createComment({
                    owner: ORG,
                    repo: repo.name,
                    issue_number: pr.number,
                    body: `${REMIND_MARKER}\n@${assignee} this PR has been idle for ${Math.floor(ageDays)} days. Either land it, close it, or push a fresh commit to reset the clock. Auto-closes after ${CLOSE_DAYS} days of inactivity.`,
                  });
                  reminded++;
                  console.log(`reminded ${ORG}/${repo.name}#${pr.number} (${Math.floor(ageDays)} days)`);
                }
              }
            }

            console.log(`Sweep complete: ${reminded} reminded, ${closed} closed.`);
            core.summary.addHeading('Stale PR sweep').addRaw(`${reminded} reminded · ${closed} closed`).write();
