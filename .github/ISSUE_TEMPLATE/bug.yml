name: Bug report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you saw, what you expected.
      placeholder: "I clicked X, expected Y, got Z instead."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: false

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: "OS, browser, app version, anything relevant."
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant console output or attach screenshots.
    validations:
      required: false
